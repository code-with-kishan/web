name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the pipeline only needs to read the repo contents.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Audit the full dependency tree (fails on high+)
        run: npm audit --audit-level=high

      - name: Lint (zero warnings)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests with coverage thresholds
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Smoke-test the built server
        run: npm run smoke

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e
