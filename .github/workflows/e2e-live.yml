name: E2E (live)

# Runs the read-only Playwright smoke suite against a deployed URL. Trigger it
# manually after each Cloud Run deploy to confirm the live critical path works.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed base URL to smoke-test (e.g. https://stadiumiq-...run.app)
        required: true

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run live E2E smoke tests
        run: npm run test:e2e:live
        env:
          E2E_BASE_URL: ${{ inputs.base_url }}
